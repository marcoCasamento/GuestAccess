version: '3.8'

services:
  guestaccess:
    image: mcasamento/guestaccess:latest
    container_name: guestaccess
    user: "1001:1001"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - AdminUser__Email=${ADMIN_EMAIL}
      - AdminUser__Password=${ADMIN_PASSWORD}
      - Authentication__Google__ClientId=${GOOGLE_CLIENT_ID}
      - Authentication__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - Authentication__Microsoft__ClientId=${MICROSOFT_CLIENT_ID}
      - Authentication__Microsoft__ClientSecret=${MICROSOFT_CLIENT_SECRET}
      - SmtpSettings__Host=${SMTP_HOST}
      - SmtpSettings__Port=${SMTP_PORT:-587}
      - SmtpSettings__Username=${SMTP_USERNAME}
      - SmtpSettings__Password=${SMTP_PASSWORD}
      - SmtpSettings__FromEmail=${SMTP_FROM_EMAIL}
      - SmtpSettings__FromName=${SMTP_FROM_NAME:-GuestAccess}
      - SmtpSettings__EnableSsl=${SMTP_ENABLE_SSL:-true}
      - HomeAssistant__BaseUrl=${HA_BASE_URL}
      - HomeAssistant__Cancello__WebhookPath=${HA_CANCELLO_WEBHOOK_PATH}
      - HomeAssistant__Cancello__SecretToken=${HA_CANCELLO_SECRET_TOKEN}
      - HomeAssistant__Cancelletto__WebhookPath=${HA_CANCELLETTO_WEBHOOK_PATH}
      - HomeAssistant__Cancelletto__SecretToken=${HA_CANCELLETTO_SECRET_TOKEN}
      - HomeAssistant__Portone__WebhookPath=${HA_PORTONE_WEBHOOK_PATH}
      - HomeAssistant__Portone__SecretToken=${HA_PORTONE_SECRET_TOKEN}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    networks:
      - guestaccess-network

networks:
  guestaccess-network:
    driver: bridge
